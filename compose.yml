services:
  # 1. บริการ PostgreSQL
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: students_db
    ports:
      - "5433:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. บริการ Redis (แก้ไขโดยการแยกพอร์ตไม่ให้ชนเผื่อมีตัวอื่นรันในเครื่อง)
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. บริการ Label Studio (เชื่อมกับ PostgreSQL)
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - label-studio-data:/label-studio/data
    environment:
      - DJANGO_DB=default
      - POSTGRES_NAME=students_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432

volumes:
  postgresql-data:
  redis-data:
  label-studio-data:
